name: Deploy to EC2 Directly (No ECR)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub se code uthana
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. GitHub Runner ke andar Docker image build karna
      - name: Build Docker Image
        run: |
          docker build -t node-app:latest .

      # 3. Image ko ek file (.tar) mein save karna taake EC2 par bheji ja sake
      - name: Save Docker Image to Tar File
        run: |
          docker save node-app:latest -o node-app.tar

      # 4. Us Tar file ko SCP ke zariye direct EC2 par transfer karna
      - name: Copy Docker Image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "node-app.tar"
          target: "/home/ubuntu/"

      # 5. EC2 ke andar SSH karke image ko load karna aur container chalana
      - name: SSH into EC2 and Run Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. EC2 ke andar tar file se Docker image load karna
            docker load -i /home/ubuntu/node-app.tar
            
            # 2. Purana container stop aur remove karna (agar chal raha ho)
            docker stop node-app || true
            docker rm node-app || true
            
            # 3. Naya container chalana (Port 3000 par)
            docker run -d \
              --name node-app \
              -p 3000:3000 \
              --restart always \
              node-app:latest
            
            # 4. Safai: Bheji gayi tar file delete karna taake EC2 ki space na bhare
            rm -f /home/ubuntu/node-app.tar
