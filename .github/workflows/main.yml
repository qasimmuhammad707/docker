name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Deploy to EC2 via SSH
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}       # secrets. lagaya
          username: ${{ secrets.EC2_USER }}   # secrets. lagaya
          key: ${{ secrets.EC2_SSH_KEY }}     # Naam sahi kiya: EC2_SSH_KEY
          script: |
            # Folder banana agar na ho, aur usme jana
            mkdir -p /home/ubuntu/app && cd /home/ubuntu/app
            
            # Purana container stop aur remove karna
            docker stop node-app || true
            docker rm node-app || true
            
            # Agar repo pehle se cloned hai toh pull karein, warna naya clone karein
            if [ -d ".git" ]; then
              git pull
            else
              # Yahan aapne apni sahi GitHub repo ka URL dalna hai
              git clone https://github.com/your-username/your-repo.git .
            fi
            
            # EC2 ke upar hi fresh Docker image build karna
            docker build -t node-app .
            
            # Container run karna (Port 3000 par)
            docker run -d \
              -p 3000:3000 \
              --name node-app \
              --restart always \
              -e NODE_ENV=production \
              node-app
